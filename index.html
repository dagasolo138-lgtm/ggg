<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个纯前端的 DeepSeek API 对话实验台" />
    <title>DeepSeek V4 Playground</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="DeepSeek V4 Playground 首页">
          <span class="brand-mark">D</span>
          <span>
            <strong>DeepSeek V4</strong>
            <small>Playground</small>
          </span>
        </a>
        <div class="topbar-note"><span class="status-dot"></span>纯前端 · API Key 不上传</div>
      </header>

      <main class="workspace">
        <aside class="settings-panel" aria-label="连接设置">
          <div class="panel-heading">
            <p class="eyebrow">CONNECTION</p>
            <h1>连接设置</h1>
            <p>先填入你自己的 Key，然后开始对话。</p>
          </div>

          <label class="field-label" for="api-key">API Key</label>
          <div class="secret-field">
            <input id="api-key" type="password" autocomplete="off" placeholder="sk-..." />
            <button id="toggle-key" class="icon-button" type="button" aria-label="显示或隐藏 API Key">显示</button>
          </div>
          <p class="field-help">仅保存到当前浏览器会话，关闭标签页后失效。</p>

          <label class="field-label" for="endpoint">接口地址</label>
          <input id="endpoint" type="url" value="https://api.deepseek.com/chat/completions" spellcheck="false" />

          <label class="field-label" for="model">模型名称</label>
          <input id="model" type="text" value="deepseek-v4" spellcheck="false" />
          <p class="field-help">模型名由你的 API 服务商实际开放的名称决定，可直接修改。</p>

          <label class="field-label" for="system-prompt">系统提示词</label>
          <textarea id="system-prompt" rows="6" placeholder="例如：你是一个简洁、可靠的中文助手。">你是一个简洁、可靠的中文助手。</textarea>

          <div class="settings-actions">
            <button id="save-settings" class="secondary-button" type="button">保存设置</button>
            <button id="clear-key" class="text-button" type="button">清除 Key</button>
          </div>

          <div class="security-note">
            <strong>部署前要知道</strong>
            <p>纯前端适合你自己使用。公开部署时，浏览器里的 Key 仍可能被拿到；后续做正式产品时要加服务端代理。</p>
          </div>
        </aside>

        <section class="chat-panel" aria-label="聊天">
          <div class="chat-header">
            <div>
              <p class="eyebrow">SESSION</p>
              <h2>新对话</h2>
            </div>
            <div class="chat-actions">
              <span id="connection-status" class="connection-status">未连接</span>
              <button id="clear-chat" class="secondary-button" type="button">清空对话</button>
            </div>
          </div>

          <div id="messages" class="messages" aria-live="polite">
            <article class="message assistant-message">
              <div class="message-avatar">D</div>
              <div class="message-content">
                <span class="message-role">DEEPSEEK</span>
                <p>设置好 API Key 后，发一句话试试。</p>
              </div>
            </article>
          </div>

          <form id="composer" class="composer">
            <textarea id="prompt" rows="1" placeholder="输入消息，Enter 发送，Shift + Enter 换行" autocomplete="off"></textarea>
            <button id="send-button" class="send-button" type="submit">
              <span>发送</span>
              <span aria-hidden="true">↗</span>
            </button>
          </form>
          <p id="error-message" class="error-message" role="alert"></p>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
